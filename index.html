<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharps & Flats — Note Trainer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vexflow/3.0.9/vexflow-min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script type="importmap">{ "imports": { "pitchy": "https://cdn.jsdelivr.net/npm/pitchy@4.1.0/+esm" } }</script>

<style>
/* ... all original styles unchanged ... */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #1a1410;
  --paper:   #f5f0e8;
  --cream:   #ede8da;
  --cream2:  #e5dfd0;
  --rule:    #c8bfa8;
  --gold:    #b8860b;
  --gold2:   #d4a017;
  --red:     #8b1a1a;
  --green:   #1a5c2e;
  --muted:   #7a6e5e;
  --shadow:  rgba(26,20,16,0.18);
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
}

body::before, body::after { /* unchanged */ 
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
body::before {
  background-image: repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(180,160,120,0.13) 31px, rgba(180,160,120,0.13) 32px);
}
body::after {
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(184,134,11,0.06) 0%, transparent 70%),
              radial-gradient(ellipse 60% 40% at 90% 100%, rgba(139,26,26,0.04) 0%, transparent 60%);
}

.screen { display: none; width: 100%; max-width: 540px; flex-direction: column; align-items: center; position: relative; z-index: 1; }
.screen.active { display: flex; }

.page-title { /* unchanged */ 
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-style: italic;
  letter-spacing: -0.01em;
  color: var(--ink);
  text-align: center;
  line-height: 1.1;
  margin-bottom: 4px;
}
.page-title em { color: var(--gold); font-style: normal; }
.page-sub {
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 32px;
  text-align: center;
}

.card {
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 32px;
  width: 100%;
  box-shadow: 0 2px 0 var(--rule), 0 8px 32px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.6);
  position: relative;
}

.card::before, .card::after {
  content: '✦';
  position: absolute;
  font-size: 0.55rem;
  color: var(--gold);
  opacity: 0.6;
}
.card::before { top: 10px; left: 14px; }
.card::after  { top: 10px; right: 14px; }

.level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }

.level-card {
  background: var(--cream2);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 22px 16px;
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.level-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform 0.2s;
}
.level-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 16px var(--shadow); }
.level-card:hover::after { transform: scaleX(1); }
.level-card:active { transform: scale(0.97); }

.level-clef {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-style: italic;
  color: var(--gold);
  display: block;
  line-height: 1;
  margin-bottom: 6px;
}
.level-label {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  line-height: 1.6;
}

.btn { /* unchanged */ 
  display: block; width: 100%; padding: 14px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  border: 1px solid var(--rule); border-radius: 3px;
  cursor: pointer; transition: all 0.18s;
  background: var(--cream2); color: var(--ink);
}
.btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: default; }

.btn-gold { background: var(--gold); color: var(--paper); border-color: var(--gold); }
.btn-gold:hover { background: var(--ink); border-color: var(--ink); }
.btn-gap { margin-top: 10px; }

/* STAFF */
#staff-wrap { /* unchanged */ 
  background: #fff; border: 1px solid var(--rule); border-radius: 3px;
  padding: 10px 0 6px; margin-bottom: 18px;
  display: flex; flex-direction: column; align-items: center;
  min-height: 148px; position: relative; width: 100%; overflow: hidden;
}
#staff-wrap.correct { background: #f0fff4; border-color: var(--green); }
#staff-wrap.wrong   { background: #fff0f0; border-color: var(--red); }
#staff-wrap.hidden-note { opacity: 0; }

/* DEBUG PANEL - Easy to remove */
#debug-panel {
  width: 100%;
  background: var(--cream2);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.68rem;
  color: var(--muted);
}
#debug-panel h3 {
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
  color: var(--gold);
}
#debug-averages {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 8px;
}
.debug-note {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 6px 8px;
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
}
.debug-note strong {
  display: block;
  font-size: 0.75rem;
  color: var(--ink);
}
.debug-note .avg {
  font-size: 0.9rem;
  color: var(--green);
}
.debug-note .avg.slow { color: var(--red); }

/* Rest of styles unchanged */
#status-text { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.04em; }
.conf-bar-wrap { height: 2px; background: var(--rule); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.conf-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--green)); border-radius: 2px; transition: width 0.06s; }

#feedback {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-style: italic;
  height: 38px;
  margin-bottom: 14px;
  letter-spacing: -0.01em;
  transition: color 0.15s;
}
#feedback.correct { color: var(--green); }
#feedback.wrong   { color: var(--red); }

.end-ornament, .end-title, .end-sub, .results-table, .divider { /* unchanged from previous version */ }
</style>
</head>
<body>

<!-- HOME - unchanged -->
<div id="screen-home" class="screen active">
  <h1 class="page-title"><em>Sharps &amp; Flats</em><br>Note Trainer</h1>
  <p class="page-sub">Select a level to begin</p>
  <div class="card">
    <div class="level-grid">
      <div class="level-card" onclick="startLevel('treble','sharp')">
        <span class="level-clef">♯</span>
        <span class="level-label">Treble Clef<br>Sharps</span>
      </div>
      <div class="level-card" onclick="startLevel('treble','flat')">
        <span class="level-clef">♭</span>
        <span class="level-label">Treble Clef<br>Flats</span>
      </div>
      <div class="level-card" onclick="startLevel('bass','sharp')">
        <span class="level-clef">♯</span>
        <span class="level-label">Bass Clef<br>Sharps</span>
      </div>
      <div class="level-card" onclick="startLevel('bass','flat')">
        <span class="level-clef">♭</span>
        <span class="level-label">Bass Clef<br>Flats</span>
      </div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <h1 class="page-title" id="game-title">Treble <em>Sharps</em></h1>
  <p class="page-sub" id="game-sub">Play the note shown</p>
  <div class="card">
    <div id="staff-wrap">
      <div id="staff-svg"></div>
    </div>

    <!-- DEBUG PANEL - Easy to remove later -->
    <div id="debug-panel">
      <h3>Debug: Average Times (last 4)</h3>
      <div id="debug-averages"></div>
    </div>

    <div class="status-row">
      <div class="mic-dot" id="mic-dot"></div>
      <span id="status-text">Starting…</span>
    </div>
    <div class="conf-bar-wrap"><div class="conf-bar" id="conf-bar"></div></div>

    <div id="feedback">&nbsp;</div>

    <button class="btn" onclick="quitGame()">Quit Level</button>
  </div>
</div>

<!-- RESULTS - unchanged -->
<div id="screen-results" class="screen">
  <h1 class="page-title"><em>Well done!</em></h1>
  <div class="divider"></div>
  <div class="card">
    <div class="end-ornament" style="text-align:center">✦</div>
    <div class="end-title win" id="results-title">Level Complete</div>
    <div class="end-sub" id="results-sub"></div>
    <table class="results-table" id="results-table">
      <thead>
        <tr><th>Note</th><th>Times Shown</th><th>Avg Time (last 4)</th></tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <button class="btn btn-gold" onclick="goHome()">Choose Another Level</button>
    <button class="btn btn-gap" onclick="retryLevel()">Play Again</button>
  </div>
</div>

<script type="module">
import { PitchDetector } from 'pitchy';

const NOTE_POOLS = { /* ... exactly the same as previous version ... */
  treble: {
    sharp: [ /* 9 notes unchanged */ 
      { vex:'e#/4', acc:'#', midi:65,  label:'E#4' },
      { vex:'f#/4', acc:'#', midi:66,  label:'F#4' },
      { vex:'g#/4', acc:'#', midi:68,  label:'G#4' },
      { vex:'a#/4', acc:'#', midi:70,  label:'A#4' },
      { vex:'b#/4', acc:'#', midi:72,  label:'B#4' },
      { vex:'c#/5', acc:'#', midi:73,  label:'C#5' },
      { vex:'d#/5', acc:'#', midi:75,  label:'D#5' },
      { vex:'e#/5', acc:'#', midi:77,  label:'E#5' },
      { vex:'f#/5', acc:'#', midi:78,  label:'F#5' },
    ],
    flat: [ /* 9 notes unchanged */ 
      { vex:'eb/4', acc:'b', midi:63,  label:'Eb4' },
      { vex:'fb/4', acc:'b', midi:64,  label:'Fb4' },
      { vex:'gb/4', acc:'b', midi:66,  label:'Gb4' },
      { vex:'ab/4', acc:'b', midi:68,  label:'Ab4' },
      { vex:'bb/4', acc:'b', midi:70,  label:'Bb4' },
      { vex:'cb/5', acc:'b', midi:71,  label:'Cb5' },
      { vex:'db/5', acc:'b', midi:73,  label:'Db5' },
      { vex:'eb/5', acc:'b', midi:75,  label:'Eb5' },
      { vex:'fb/5', acc:'b', midi:76,  label:'Fb5' },
    ],
  },
  bass: { /* unchanged */ 
    sharp: [ /* ... */ ],
    flat: [ /* ... */ ]
  }
};

const VF = Vex ? Vex.Flow : VexFlow;

function renderNote(noteObj) { /* unchanged */ 
  /* ... same rendering code as before ... */
  const container = document.getElementById('staff-svg');
  container.innerHTML = '';
  const wrap = document.getElementById('staff-wrap');
  const W = Math.min(400, wrap.clientWidth - 16);
  const H = 148;
  const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
  renderer.resize(W, H);
  const ctx = renderer.getContext();
  const scale = W / 400;
  const staveX = Math.round(10 * scale);
  const staveY = 24;
  const staveW = W - staveX * 2;
  const stave = new VF.Stave(staveX, staveY, staveW);
  stave.addClef(currentClef);
  stave.setContext(ctx).draw();
  const sn = new VF.StaveNote({ clef: currentClef, keys: [noteObj.vex], duration: 'q' });
  sn.addAccidental(0, new VF.Accidental(noteObj.acc));
  const voice = new VF.Voice({ num_beats: 1, beat_value: 4 });
  voice.setStrict(false);
  voice.addTickables([sn]);
  new VF.Formatter().joinVoices([voice]).format([voice], staveW - Math.round(80 * scale));
  voice.draw(ctx, stave);
}

function freqToMidi(freq, centsWindow = 80) { /* unchanged */ 
  const exact = 12 * Math.log2(freq / 440) + 69;
  const nearest = Math.round(exact);
  const cents = Math.abs(exact - nearest) * 100;
  return cents <= centsWindow ? nearest : -1;
}

// State (unchanged)
let currentClef = 'treble';
let currentAcc = 'sharp';
let notePool = [];
let noteStats = [];
let introducedIndices = [];
let introOrder = [];
let introPtr = 0;
let currentNoteIdx = -1;
let noteShownAt = 0;
let waitingForCorrect = false;
let newestNoteIdx = -1;

let listening = false;
let audioCtx = null;
let analyser = null;
let micStream = null;
let rafId = null;
let detector = null;
let inputBuf = null;
let cooldown = false;
let lastMidi = -1;
let stableCount = 0;

const STABLE_NEEDED = 6;
const CLARITY_THRESHOLD = 0.82;
const MASTERY_THRESHOLD = 1.5;
const MIN_SHOWS = 4;
const NOTE_GAP_MS = 250;

// NEW: Debug display functions (easy to remove)
function buildDebugPanel() {
  const container = document.getElementById('debug-averages');
  container.innerHTML = '';
  notePool.forEach((note, i) => {
    const div = document.createElement('div');
    div.className = 'debug-note';
    div.id = `debug-note-${i}`;
    div.innerHTML = `<strong>${note.label}</strong><span class="avg">—</span>`;
    container.appendChild(div);
  });
}

function updateDebugPanel() {
  notePool.forEach((_, i) => {
    const el = document.getElementById(`debug-note-${i}`);
    if (!el) return;
    const avg = rollingAvg(i);
    const avgSpan = el.querySelector('.avg');
    if (avg === null) {
      avgSpan.textContent = '—';
      avgSpan.classList.remove('slow');
    } else {
      avgSpan.textContent = avg.toFixed(2) + 's';
      avgSpan.classList.toggle('slow', avg > 1.5);
    }
  });
}

// Rest of the code remains exactly the same as the last working version
function rollingAvg(idx) {
  const t = noteStats[idx].timings;
  if (t.length < MIN_SHOWS) return null;
  const last4 = t.slice(-4);
  return last4.reduce((a, b) => a + b, 0) / 4;
}

function isMastered(idx) {
  const avg = rollingAvg(idx);
  return avg !== null && avg <= MASTERY_THRESHOLD;
}

function allIntroducedMastered() {
  return introducedIndices.every(i => isMastered(i));
}

function pickNextNote() { /* unchanged */ 
  if (introducedIndices.length === 1) return introducedIndices[0];
  const newest = newestNoteIdx;
  if (noteStats[newest].showCount < 2) return newest;
  if (noteStats[newest].showCount < MIN_SHOWS) {
    let idx = introducedIndices[Math.floor(Math.random() * introducedIndices.length)];
    if (idx === currentNoteIdx && introducedIndices.length > 1) {
      idx = introducedIndices[Math.floor(Math.random() * introducedIndices.length)];
    }
    return idx;
  }
  return weightedPick();
}

function weightedPick() { /* unchanged */ 
  const weights = introducedIndices.map(i => rollingAvg(i) === null ? 5.0 : rollingAvg(i));
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let k = 0; k < weights.length; k++) {
    r -= weights[k];
    if (r <= 0) {
      let idx = introducedIndices[k];
      if (idx === currentNoteIdx && introducedIndices.length > 1) return weightedPick();
      return idx;
    }
  }
  return introducedIndices[introducedIndices.length - 1];
}

window.startLevel = async function(clef, acc) {
  // ... same as before ...
  currentClef = clef;
  currentAcc = acc;
  notePool = NOTE_POOLS[clef][acc].slice();
  noteStats = notePool.map(() => ({ timings: [], showCount: 0 }));
  introducedIndices = [];
  introOrder = shuffle([...Array(notePool.length).keys()]);
  introPtr = 0;
  currentNoteIdx = -1;
  newestNoteIdx = -1;
  cooldown = false;
  lastMidi = -1;
  stableCount = 0;
  waitingForCorrect = false;

  const accLabel = acc === 'sharp' ? 'Sharps' : 'Flats';
  const clefLabel = clef === 'treble' ? 'Treble' : 'Bass';
  document.getElementById('game-title').innerHTML = `${clefLabel} <em>${accLabel}</em>`;

  document.getElementById('feedback').innerHTML = '&nbsp;';
  document.getElementById('staff-wrap').classList.remove('correct','wrong','hidden-note');

  showScreen('screen-game');
  buildDebugPanel();                    // ← New
  await initAudio();
  if (!listening) return;

  showNextNote();
  audioLoop();
};

function showNextNote() { /* unchanged */ 
  /* ... same code ... */
  if (!listening) return;

  let idx;
  if (introPtr < introOrder.length && allIntroducedMastered()) {
    idx = introOrder[introPtr];
    introducedIndices.push(idx);
    newestNoteIdx = idx;
    introPtr++;
  } else {
    idx = pickNextNote();
  }

  currentNoteIdx = idx;
  noteShownAt = Date.now();
  waitingForCorrect = true;
  cooldown = false;
  lastMidi = -1;
  stableCount = 0;

  const wrap = document.getElementById('staff-wrap');
  wrap.classList.remove('correct', 'wrong', 'hidden-note');
  document.getElementById('feedback').innerHTML = '&nbsp;';
  document.getElementById('feedback').className = '';

  renderNote(notePool[idx]);
  document.getElementById('status-text').textContent = 'Listening — play the note shown';
}

function onCorrect() {
  const elapsed = (Date.now() - noteShownAt) / 1000;
  const idx = currentNoteIdx;
  noteStats[idx].timings.push(elapsed);
  noteStats[idx].showCount++;

  waitingForCorrect = false;
  flash('Correct!', 'correct');

  updateDebugPanel();                    // ← New: update debug display

  if (introducedIndices.length === notePool.length && allIntroducedMastered()) {
    setTimeout(endLevel, 800);
    return;
  }

  setTimeout(() => {
    const wrap = document.getElementById('staff-wrap');
    wrap.classList.add('hidden-note');
    document.getElementById('staff-svg').innerHTML = '';
    setTimeout(() => {
      wrap.classList.remove('hidden-note');
      showNextNote();
    }, NOTE_GAP_MS);
  }, 500);
}

function onWrong() { /* unchanged */ 
  flash('Wrong', 'wrong');
  cooldown = true;
  setTimeout(() => { cooldown = false; lastMidi = -1; stableCount = 0; }, 900);
}

function flash(text, cls) { /* unchanged */ 
  /* ... same ... */
}

function endLevel() { /* unchanged */ 
  /* ... same results code ... */
  stopAudio();
  const accLabel = currentAcc === 'sharp' ? 'Sharps' : 'Flats';
  const clefLabel = currentClef === 'treble' ? 'Treble Clef' : 'Bass Clef';
  document.getElementById('results-title').textContent = `${clefLabel} ${accLabel} — Complete`;
  document.getElementById('results-sub').textContent = 'All 9 notes mastered. Here are your average response times:';

  const tbody = document.getElementById('results-body');
  tbody.innerHTML = '';

  notePool.forEach((n, i) => {
    const avg = rollingAvg(i);
    const tr = document.createElement('tr');
    const tdNote = document.createElement('td');
    const tdShows = document.createElement('td');
    const tdAvg = document.createElement('td');

    tdNote.textContent = n.label;
    tdShows.textContent = noteStats[i].showCount;

    if (avg === null) {
      tdAvg.textContent = '—';
    } else {
      tdAvg.textContent = avg.toFixed(2) + 's';
      if (avg <= 1.0) tdAvg.classList.add('time-fast');
      else if (avg >= 1.4) tdAvg.classList.add('time-slow');
    }

    tr.append(tdNote, tdShows, tdAvg);
    tbody.appendChild(tr);
  });

  showScreen('screen-results');
}

// Audio functions unchanged (initAudio, stopAudio, audioLoop, shuffle, etc.)
async function initAudio() { /* same as before */ 
  /* ... */
}

function stopAudio() { /* same */ }
function audioLoop() { /* same */ }
function shuffle(arr) { /* same */ }

window.addEventListener('resize', () => {
  if (currentNoteIdx !== -1 && listening) renderNote(notePool[currentNoteIdx]);
});
</script>
</body>
